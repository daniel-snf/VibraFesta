<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirecciones personalizadas
    const routes = {
      '/': '/index.html',
      '/home': '/index.html',
      '/galeria': '/galeria',          // mantiene la URL /galeria
      '/eventos': '/galeria',          // alias a galeria
      '/contacto': '/index.html#contact',
      '/expositores': '/index.html#vendors',
      '/nosotros': '/index.html#about'
    };

    const currentPath = window.location.pathname;

    // Si alguien entra a /gallery.html, lo mandamos a /galeria
    if (currentPath === '/gallery.html') {
      window.location.replace('/galeria');
    }
    // Si la ruta está en el mapa, redirigimos donde corresponde
    else if (routes[currentPath]) {
      window.location.replace(routes[currentPath]);
    }
    // Para cualquier otra cosa, al home
    else {
      window.location.replace('/index.html');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
